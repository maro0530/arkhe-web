<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARKHE — 始まりの香り</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --cream: #f2ede6;
            --muted: #3a3a38;
            --subtle: #1e1e1c;
            --brass: #8a6c2a;
            --text-main: #d8d4cc;
            --text-dim: #4a4a46;
            --text-ghost: rgba(210,205,195,0.06);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; font-size:16px; }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Noto Serif JP', 'Cormorant Garamond', serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* GRAIN OVERLAY */
        body::before {
            content:'';
            position:fixed;
            inset:0;
            z-index:999;
            pointer-events:none;
            opacity:.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://w3.org id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 180px;
        }

        nav {
            position: fixed;
            top:0; left:0; right:0;
            z-index: 500;
            padding: 28px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: .6em;
            color: var(--cream);
            text-decoration: none;
            opacity: .7;
            transition: opacity .4s ease;
        }

        #hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .hero-ghost {
            position: absolute;
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(200px, 40vw, 400px);
            color: var(--text-ghost);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            z-index: 1;
        }

        .hero-inner {
            text-align: center;
            z-index: 2;
        }

        .hero-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(52px, 10vw, 96px);
            color: var(--cream);
            margin-bottom: 24px;
        }

        /* 簡易的なボトル表示 */
        .bottle-visual {
            width: 100px;
            height: 200px;
            background: linear-gradient(to bottom, var(--brass), var(--subtle));
            margin: 40px auto;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="#" class="nav-logo">ARKHE</a>
    </nav>

    <section id="hero">
        <div class="hero-ghost">ARKHE</div>
        <div class="hero-inner">
            <p style="letter-spacing: 0.5em; font-size: 12px; margin-bottom: 20px;">EAU DE PARFUM</p>
            <h1 class="hero-title">ARKHE</h1>
            <p>始まりの香り。静寂の中に宿る、確かな鼓動。</p>
        </div>
    </section>

    <section style="padding: 100px 20px; text-align: center;">
        <div class="bottle-visual"></div>
        <p>No.001 - Primitive Silence</p>
    </section>
</body>
</html>
